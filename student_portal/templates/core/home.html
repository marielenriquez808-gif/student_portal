{% extends 'base.html' %}
{% load static %}
{% block title %}Welcome - Student Portal{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-card fade-in" style="max-width:500px;text-align:center">
    <img src="{% static 'images/logo.png' %}" alt="Student Portal System" class="hero-logo-img">
    <h3 class="fw-800 mt-1" style="color:var(--sidebar-bg)">Student Portal System</h3>
    <p class="text-muted">Integrated Academic Management for Students, Instructors, and Administrators</p>
    <div class="d-grid gap-2 mt-4">
      <a href="{% url 'student_login' %}" class="btn btn-primary fw-bold"><i class="bi bi-mortarboard me-2"></i>Student Login</a>
      <a href="{% url 'instructor_login' %}" class="btn btn-outline-primary fw-bold"><i class="bi bi-person-badge me-2"></i>Instructor Login</a>
      <a href="{% url 'admin_login' %}" class="btn btn-outline-secondary fw-bold"><i class="bi bi-shield me-2"></i>Admin Login</a>
    </div>
  </div>
</div>
{% endblock %}
